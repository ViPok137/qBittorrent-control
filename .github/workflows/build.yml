name: Build QB Cleaner

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Обновлено до v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Обновлено до v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --onefile --name "QB_Cleaner" qb_cleaner.py

    - name: Build with PyInstaller (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: pyinstaller --onefile --name "qb_cleaner" qb_cleaner.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # ИСПРАВЛЕНО: v3 заменена на v4
      with:
        name: qb-cleaner-${{ matrix.os }}
        path: dist/
